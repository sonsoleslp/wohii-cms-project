<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.4rem;
    }

    #logout-btn {
      background: transparent;
      color: #e94560;
      border: 1px solid #e94560;
      padding: 0.4rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      display: none;
    }

    #logout-btn:hover {
      background: #e94560;
      color: #fff;
    }

    main {
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* Auth form */
    #auth-section {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      margin: 4rem auto;
    }

    #auth-section h2 {
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.3rem;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }

    .form-group input:focus {
      outline: none;
      border-color: #0f3460;
    }

    #auth-section button {
      width: 100%;
      padding: 0.7rem;
      background: #0f3460;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    #auth-section button:hover {
      background: #1a1a2e;
    }

    .switch-text {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .switch-text a {
      color: #e94560;
      text-decoration: none;
      font-weight: 600;
    }

    .error {
      color: #e94560;
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    /* Posts */
    .post-card {
      background: #fff;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 1rem;
    }

    .post-card h3 {
      margin-bottom: 0.4rem;
    }

    .post-link {
      color: #0f3460;
      text-decoration: none;
    }

    .post-link:hover {
      text-decoration: underline;
    }

    .read-more {
      display: inline-block;
      margin-top: 0.8rem;
      color: #e94560;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .read-more:hover {
      text-decoration: underline;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1rem;
      color: #0f3460;
      text-decoration: none;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .post-meta {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 0.8rem;
    }

    .like-count {
      font-size: 0.85rem;
      color: #e94560;
      margin-left: auto;
      margin-right: 0.5rem;
    }

    .post-content {
      line-height: 1.6;
      color: #333;
    }

    .post-image {
      display: block;
      max-width: 100%;
      border-radius: 6px;
      margin-bottom: 1rem;
    }

    .post-thumb {
      display: block;
      max-width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 6px;
      margin: 0.5rem 0;
    }

    .post-keywords {
      margin-top: 0.8rem;
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .keyword {
      background: #e8eaf6;
      color: #0f3460;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.8rem;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .page-info {
      font-size: 0.9rem;
      color: #555;
    }

    .btn-page {
      background: #0f3460;
      color: #fff;
    }

    .btn-page:hover:not(:disabled) {
      background: #1a1a2e;
    }

    .btn-page:disabled {
      background: #ccc;
      color: #888;
      cursor: not-allowed;
    }

    /* Toolbar & search */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .toolbar .btn-primary {
      margin-bottom: 0;
    }

    .search-bar {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }

    .search-bar input {
      padding: 0.5rem 0.8rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.9rem;
      width: 200px;
    }

    .search-bar input:focus {
      outline: none;
      border-color: #0f3460;
    }

    .btn-search {
      background: #0f3460;
      color: #fff;
    }

    .btn-search:hover {
      background: #1a1a2e;
    }

    .btn-clear {
      background: #eee;
      color: #333;
    }

    .btn-clear:hover {
      background: #ddd;
    }

    /* Buttons */
    .btn {
      padding: 0.4rem 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .btn-primary {
      background: #0f3460;
      color: #fff;
      padding: 0.6rem 1.2rem;
      font-size: 0.95rem;
      margin-bottom: 1.2rem;
    }

    .btn-primary:hover {
      background: #1a1a2e;
    }

    .btn-edit {
      background: #e8eaf6;
      color: #0f3460;
    }

    .btn-edit:hover {
      background: #c5cae9;
    }

    .btn-delete {
      background: #fde8ec;
      color: #e94560;
    }

    .btn-delete:hover {
      background: #f8c4cc;
    }

    .btn-like {
      background: #fde8ec;
      color: #e94560;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .btn-like:hover {
      background: #f8c4cc;
    }

    .btn-like.liked {
      background: #e94560;
      color: #fff;
    }

    .btn-like.liked:hover {
      background: #c9344d;
    }

    /* Post actions row */
    .post-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.8rem;
    }

    .detail-actions {
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .owner-actions {
      display: flex;
      gap: 0.5rem;
    }

    /* Post form */
    .post-form-wrapper {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .post-form-wrapper h2 {
      margin-bottom: 1.5rem;
    }

    .post-form-wrapper textarea {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
    }

    .post-form-wrapper textarea:focus {
      outline: none;
      border-color: #0f3460;
    }

    .post-form-wrapper input {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 1rem;
    }

    .post-form-wrapper input:focus {
      outline: none;
      border-color: #0f3460;
    }
  </style>
</head>
<body>
  <header>
    <h1>CMS</h1>
    <button id="logout-btn">Log out</button>
  </header>

  <main>
    <section id="auth-section" style="display: none"></section>

    <section id="app-section" style="display: none">
      <div id="posts-container"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
